<section class="login">
  <form class="login__card" (ngSubmit)="submit()">
    <h1 class="login__title">
      <i class="pi pi-sign-in" aria-hidden="true"></i>
      Sign in
    </h1>

    @if (error()) {
      <p class="login__error" role="alert">{{ error() }}</p>
    }

    <label class="login__field">
      <span>Username</span>
      <input name="username" [(ngModel)]="username" autocomplete="username" required />
    </label>

    <label class="login__field">
      <span>Password</span>
      <input
        name="password"
        type="password"
        [(ngModel)]="password"
        autocomplete="current-password"
        required
      />
    </label>

    <button type="submit" class="login__submit" [disabled]="submitting()">
      {{ submitting() ? 'Signing in…' : 'Sign in' }}
    </button>

    <p class="login__hint">POC stub — employee / staffeng or manager / staffeng.</p>
  </form>
</section>
