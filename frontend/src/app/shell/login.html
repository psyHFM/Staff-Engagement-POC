<section class="login">
  <form class="login__card" (ngSubmit)="submit()">
    <h1 class="login__title">
      <i class="pi pi-sign-in" aria-hidden="true"></i>
      Sign in
    </h1>

    @if (showSessionExpiredBanner()) {
      <p class="login__banner login__banner--info" role="alert">
        <i class="pi pi-info-circle" aria-hidden="true"></i>
        Your session has ended — please sign in again.
      </p>
    }

    @if (showUnauthorisedBanner()) {
      <p class="login__banner login__banner--warning" role="alert">
        <i class="pi pi-exclamation-triangle" aria-hidden="true"></i>
        You are not authorised to access that page.
      </p>
    }

    @if (error()) {
      <p class="login__error" role="alert">{{ error() }}</p>
    }

    <label class="login__field">
      <span>Username</span>
      <input name="username" [(ngModel)]="username" autocomplete="username" required />
    </label>

    <label class="login__field">
      <span>Password</span>
      <input
        name="password"
        type="password"
        [(ngModel)]="password"
        autocomplete="current-password"
        required
      />
    </label>

    <button type="submit" class="login__submit" [disabled]="submitting()">
      {{ submitting() ? 'Signing in…' : 'Sign in' }}
    </button>

    <p class="login__hint">POC stub — employee@staff.eng / staffeng or admin@staff.eng / staffeng.</p>
  </form>
</section>
