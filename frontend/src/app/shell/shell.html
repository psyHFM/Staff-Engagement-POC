<header class="shell__bar">
  <a class="shell__brand" routerLink="/dashboard">
    <i class="pi pi-th-large" aria-hidden="true"></i>
    Staff Engagement
  </a>

  <nav class="shell__nav">
    <a routerLink="/dashboard" routerLinkActive="shell__nav-link--active">Dashboard</a>
    <a routerLink="/employees" routerLinkActive="shell__nav-link--active">Employees</a>
    <a routerLink="/interactions" routerLinkActive="shell__nav-link--active">Interactions</a>
    <a routerLink="/tasks" routerLinkActive="shell__nav-link--active">Tasks</a>
    <a routerLink="/portfolio" routerLinkActive="shell__nav-link--active">Portfolio</a>
    <a routerLink="/skills" routerLinkActive="shell__nav-link--active">Skills</a>
  </nav>

  <div class="shell__auth">
    @if (auth.isAuthenticated()) {
      <div class="auth-menu" [class.open]="isMenuOpen()">
        <button
          type="button"
          class="auth-menu-trigger"
          (click)="toggleMenu()"
          [attr.aria-expanded]="isMenuOpen()"
          [attr.aria-haspopup]="true"
          #triggerBtn>

          <span class="user-greeting">{{ auth.currentUser() }}</span>
          <i class="pi" [class.pi-chevron-down]="!isMenuOpen()" [class.pi-chevron-up]="isMenuOpen()"></i>
        </button>

        @if (isMenuOpen()) {
          <div class="auth-menu-dropdown" (clickOutside)="closeMenu()">
            <ul class="auth-menu-items">
              <li>
                <a [routerLink]="profileLink()" (click)="closeMenu()" *ngIf="profileLink()">
                  <i class="pi pi-user"></i>
                  Profile
                </a>
              </li>
              <li>
                <button type="button" (click)="onLogout()">
                  <i class="pi pi-sign-out"></i>
                  Sign out
                </button>
              </li>
            </ul>
          </div>
        }
      </div>
    } @else {
      <a routerLink="/login" class="shell__login">Sign in</a>
    }
  </div>
</header>

<main class="shell__main">
  <router-outlet />
</main>
