<label class=\"employee-picker\">
  <span class=\"employee-picker__label\">Subject</span>
  <select
    class=\"employee-picker__select\"
    (change)=\"onSelectChange()\"
    [disabled]=\"isLoading() || readonly()\">
    <option value=\"\" disabled [selected]=\"value() === null\">
      {{ isLoading() ? 'Loading employees…' : (readonly() ? 'Employee selected from interaction' : 'Select an employee') }}
    </option>
    @for (employee of options(); track employee.id.value) {
      <option [value]=\"employee.id.value\" [selected]=\"value() === employee.id.value\">
        {{ employee.fullName }}
      </option>
    }
  </select>
  @if (error()) {
    <span class=\"employee-picker__error\">{{ error()?.message ?? 'Failed to load employees' }}</span>
  }
</label>
