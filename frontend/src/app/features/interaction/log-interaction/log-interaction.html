<article class="log-interaction">
  <h2 class="log-interaction__title">Log interaction</h2>

  <form (ngSubmit)="submit()" class="log-interaction__form">
    <div class="log-interaction__field">
      <label for="log-type">Type</label>
      <select id="log-type" [(ngModel)]="type" name="type" required>
        @for (t of types; track t.value) {
          <option [value]="t.value">{{ t.label }}</option>
        }
      </select>
    </div>

    <div class="log-interaction__field">
      <label for="log-employee">Employee</label>
      <select id="log-employee" [(ngModel)]="subjectId" name="employee" required>
        @for (s of subjects; track s.id.value) {
          <option [value]="s.id.value">{{ s.fullName }}</option>
        }
      </select>
    </div>

    <div class="log-interaction__field">
      <label for="log-subjectText">Subject</label>
      <input type="text" id="log-subjectText" [(ngModel)]="subjectText" name="subjectText" maxlength="100" placeholder="Brief subject/summary" />
    </div>

    <div class="log-interaction__field">
      <label for="log-facilitator">Facilitator</label>
      <select id="log-facilitator" [(ngModel)]="facilitatorId" name="facilitator" required>
        @for (s of subjects; track s.id.value) {
          <option [value]="s.id.value">{{ s.fullName }}</option>
        }
      </select>
    </div>

    <div class="log-interaction__field">
      <label for="log-note">Note</label>
      <textarea id="log-note" [(ngModel)]="note" name="note" rows="4"></textarea>
    </div>

    <button type="submit" class="log-interaction__submit" [disabled]="!subjectId || !facilitatorId">
      <i class="pi pi-plus" aria-hidden="true"></i> Log interaction
    </button>
  </form>
</article>
