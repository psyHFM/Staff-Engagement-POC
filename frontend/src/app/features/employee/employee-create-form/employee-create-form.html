<article class="employee-create-form">
  <h2 class="employee-create-form__title">Create your profile</h2>

  <form (ngSubmit)="submit()" class="employee-create-form__form">
    <div class="employee-create-form__field">
      <label for="create-fullName">Full name</label>
      <input id="create-fullName" name="fullName" [(ngModel)]="fullName" required maxlength="255" />
    </div>

    <div class="employee-create-form__field">
      <label for="create-jobTitle">Job title</label>
      <input id="create-jobTitle" name="jobTitle" [(ngModel)]="jobTitle" maxlength="255" />
    </div>

    <div class="employee-create-form__field">
      <label for="create-department">Department</label>
      <input id="create-department" name="department" [(ngModel)]="department" maxlength="255" />
    </div>

    <div class="employee-create-form__field">
      <label for="create-level">Level</label>
      <select id="create-level" name="level" [(ngModel)]="level">
        <option [ngValue]="null">—</option>
        @for (option of levels; track option.value) {
          <option [value]="option.value">{{ option.label }}</option>
        }
      </select>
    </div>

    <button type="submit" class="employee-create-form__submit" [disabled]="!fullName.trim() || submitting">
      <i class="pi pi-plus" aria-hidden="true"></i> Create profile
    </button>
  </form>
</article>
