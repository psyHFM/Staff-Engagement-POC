<section class="employee-page">
  <header class="employee-page__header">
    <h1><i class="pi pi-users" aria-hidden="true"></i> Employees</h1>
    <a routerLink="/dashboard" class="employee-page__back">← Dashboard</a>
  </header>

  @if (state.error()) {
    <div class="employee-page__error" role="alert">
      {{ state.error()?.message }}
      <button type="button" (click)="state.clearTransient()">Dismiss</button>
    </div>
  }

  <section class="employee-page__directory">
    <h2 class="employee-page__section-title">Employee directory</h2>
    <app-employee-list
      [directory]="state.employees()"
      [loading]="state.isLoading()"
      [sort]="sort()"
      (pageRequested)="onPageRequested($event)"
      (sortRequested)="onSortRequested($event)"
      (selected)="onSelect($event)"></app-employee-list>
  </section>
</section>
