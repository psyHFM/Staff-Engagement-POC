# nginx config for the Angular SPA: history routing + reverse proxy to the backend.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA: fall back to index.html for client-side routes.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to the backend service (keeps same-origin for the SPA).
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Static assets are fingerprinted -> cache aggressively.
    location ~* \.(?:js|css|woff2?|png|jpe?g|svg|gif|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}