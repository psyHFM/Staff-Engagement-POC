frontend_state:
  version: 1.2.0
  last_updated: 2026-06-25

  primary_mechanism:
    tool: "Angular Signals"
    distribution: "Service-Based State"
    flow_pattern: "Unidirectional Data Flow"

  state_hierarchy:
    local_state:
      tool: "component-level signals"
      usage: "Transient UI state (e.g., loading spinners, open/closed toggles)"
    global_state:
      tool: "Root-level State Services"
      usage: "Shared domain data (e.g., currentUser, activeProject, systemSettings)"

  async_integration:
    pipeline: "RxJS -> Signal"
    method: "toSignal()"
    description: "Use RxJS for data fetching streams and convert them to Signals for UI consumption."

  side_effects:
    placement: "State Service Handlers"
    logic: "The state service is responsible for calling the API and updating the associated signal."
    example: "stateService.updateUser(data) { this.api.put(data).subscribe(() => this.user.set(updated)); }"

  derived_state:
    mechanism: "Pure computed()"
    policy: "Any state that can be calculated from other signals must use computed() to avoid manual synchronization errors."

  persistence:
    strategy: "In-Memory by Default; One Explicit Carve-Out"
    policy: "No state persistence across refreshes for the POC; state is reset on page load. Exception: authentication tokens and usernames managed by AuthState MAY be persisted to sessionStorage for the lifetime of the JWT (see ATSE1-41 / atse1-25-35-ux-walkthrough-fixes)."
    carve_outs:
      - name: "Authentication token (JWT)"
        added_in: "atse1-25-35-ux-walkthrough-fixes (2026-06-25); aligned with ATSE1-41 (PR #37) on 2026-06-25"
        mechanism: "sessionStorage under the key 'staff-engagement:token' (and the companion username under 'staff-engagement:username')"
        rationale: "Reload and direct-navigation must not bounce the user back to /login. The JWT is already a bearer token, so XSS exposure is no worse than before; the existing bearerAuthInterceptor is the read path. sessionStorage is cleared automatically when the tab closes, scoping the persistence to the JWT's lifetime."
        lifecycle: "Cleared on explicit AuthState.logout() and on any HTTP 401 response (handled by authErrorInterceptor calling AuthState.clearOnUnauthorized())."
        excludes: "All other state (employees, tasks, interactions, portfolios, current user metadata) remains in-memory. A future per-user preferences layer is still out of scope."

  constraints:
    - "Components must not update global state signals directly (must call a method on the state service)"
    - "Avoid using BehaviorSubjects if a Signal can achieve the same result"
    - "Derived state must never be set manually via .set() or .update()"
